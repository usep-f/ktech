<body class="bg-background text-on-background min-h-screen flex items-center justify-center p-4">
<!-- Modal Backdrop -->
<div class="fixed inset-0 bg-surface-container-lowest/80 backdrop-blur-sm z-40 flex items-center justify-center">
<!-- Modal Container -->
<div class="relative w-full max-w-md bg-surface-container border border-outline-variant/30 rounded-xl shadow-2xl shadow-primary-container/5 overflow-hidden z-50">
<!-- Modal Header -->
<div class="px-8 pt-8 pb-6 border-b border-outline-variant/20 relative">
<button class="absolute top-6 right-6 text-on-surface-variant hover:text-primary transition-colors focus:outline-none">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
<div class="flex items-center gap-3 mb-2">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="dns">dns</span>
<h2 class="font-headline-sm text-headline-sm text-on-surface font-bold">KTech Solutions</h2>
</div>
<h3 class="font-headline-md text-headline-md text-on-surface">Create Account</h3>
<p class="font-body-sm text-body-sm text-on-surface-variant mt-2">Deploy your high-performance infrastructure today.</p>
</div>
<!-- Modal Body (Form) -->
<form class="px-8 py-6 space-y-5">
<!-- Full Name Field -->
<div class="space-y-1">
<label class="font-label-md text-label-md text-on-surface" for="fullName">Full Name</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-on-surface-variant">
<span class="material-symbols-outlined text-[20px]" data-icon="person">person</span>
</div>
<input class="w-full bg-surface-container-high border border-outline-variant text-on-surface font-body-md text-body-md rounded-lg py-3 pl-10 pr-4 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary focus:shadow-[0_0_10px_rgba(0,229,255,0.1)] transition-all placeholder-on-surface-variant/50" id="fullName" placeholder="Jane Doe" type="text">
</div>
</div>
<!-- Business Email Field -->
<div class="space-y-1">
<label class="font-label-md text-label-md text-on-surface" for="email">Business Email</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-on-surface-variant">
<span class="material-symbols-outlined text-[20px]" data-icon="mail">mail</span>
</div>
<input class="w-full bg-surface-container-high border border-outline-variant text-on-surface font-body-md text-body-md rounded-lg py-3 pl-10 pr-4 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary focus:shadow-[0_0_10px_rgba(0,229,255,0.1)] transition-all placeholder-on-surface-variant/50" id="email" placeholder="jane@company.com" type="email">
</div>
</div>
<!-- Password Field -->
<div class="space-y-1">
<label class="font-label-md text-label-md text-on-surface" for="password">Password</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-on-surface-variant">
<span class="material-symbols-outlined text-[20px]" data-icon="lock">lock</span>
</div>
<input class="w-full bg-surface-container-high border border-outline-variant text-on-surface font-body-md text-body-md rounded-lg py-3 pl-10 pr-10 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary focus:shadow-[0_0_10px_rgba(0,229,255,0.1)] transition-all placeholder-on-surface-variant/50" id="password" placeholder="••••••••" type="password">
<button class="absolute inset-y-0 right-0 pr-3 flex items-center text-on-surface-variant hover:text-primary transition-colors focus:outline-none" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility">visibility</span>
</button>
</div>
<p class="font-label-sm text-label-sm text-on-surface-variant mt-1">Must be at least 8 characters long.</p>
</div>
<!-- Terms of Service Checkbox -->
<div class="flex items-start mt-4 pt-2">
<div class="flex items-center h-5">
<input class="w-4 h-4 rounded border-outline-variant bg-surface-container-high text-primary focus:ring-primary focus:ring-offset-surface-container focus:ring-offset-2" id="terms" type="checkbox">
</div>
<div class="ml-3 text-sm">
<label class="font-body-sm text-body-sm text-on-surface-variant" for="terms">
                            I agree to the <a class="text-primary hover:text-primary-container underline underline-offset-2 transition-colors" href="#">Terms of Service</a> and <a class="text-primary hover:text-primary-container underline underline-offset-2 transition-colors" href="#">Privacy Policy</a>.
                        </label>
</div>
</div>
<!-- Submit Button -->
<div class="pt-4 pb-2">
<button class="w-full h-14 bg-primary text-on-primary-container font-label-md text-label-md rounded-lg hover:bg-primary-container focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:ring-offset-surface-container transition-all flex items-center justify-center gap-2 shadow-[0_0_15px_rgba(0,229,255,0.2)]" type="submit">
                        Create Account
                        <span class="material-symbols-outlined text-[20px]" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</form>
<!-- Modal Footer -->
<div class="px-8 py-4 border-t border-outline-variant/20 bg-surface-container-lowest text-center">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                    Already have an account? <a class="text-primary font-label-md text-label-md hover:text-primary-container underline underline-offset-2 transition-colors" href="#">Log in</a>
</p>
</div>
</div>
</div>
</body></html>
