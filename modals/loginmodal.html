<body class="bg-background text-on-surface font-body-md h-screen w-screen overflow-hidden flex items-center justify-center">
<!-- Modal Overlay Backdrop -->
<div class="fixed inset-0 bg-surface-container-lowest/80 backdrop-blur-sm z-40 flex items-center justify-center p-margin-mobile md:p-margin-desktop">
<!-- Modal Container (Card) -->
<div class="bg-surface-container-low border border-outline-variant/50 rounded-lg w-full max-w-[480px] shadow-2xl relative z-50 overflow-hidden flex flex-col">
<!-- Top Featured Border -->
<div class="h-[2px] bg-primary w-full"></div>
<!-- Modal Header -->
<div class="px-gutter pt-gutter pb-6 flex justify-between items-start border-b border-outline-variant/30">
<div>
<h2 class="font-headline-md text-headline-md text-on-surface mb-2">Login</h2>
<p class="font-body-sm text-body-sm text-on-surface-variant">Access your high-performance infrastructure dashboard.</p>
</div>
<button class="text-on-surface-variant hover:text-primary transition-colors p-2 rounded-full hover:bg-surface-variant/50">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
</div>
<!-- Modal Body (Form) -->
<form class="p-gutter flex flex-col gap-6">
<!-- Email Field -->
<div class="flex flex-col gap-2">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider" for="email">Corporate Email</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline" data-icon="mail">mail</span>
<input class="w-full bg-surface-container border-b border-outline-variant focus:border-primary focus:ring-0 focus:outline-none focus:shadow-[0_0_15px_rgba(195,245,255,0.1)] text-on-surface font-body-md pl-12 pr-4 py-4 rounded-t-DEFAULT transition-all" id="email" placeholder="admin@enterprise.com" required="" type="email">
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-2">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider" for="password">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline" data-icon="lock">lock</span>
<input class="w-full bg-surface-container border-b border-outline-variant focus:border-primary focus:ring-0 focus:outline-none focus:shadow-[0_0_15px_rgba(195,245,255,0.1)] text-on-surface font-body-md pl-12 pr-12 py-4 rounded-t-DEFAULT transition-all" id="password" placeholder="••••••••" required="" type="password">
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Remember Me & Forgot Password -->
<div class="flex items-center justify-between mt-2">
<label class="flex items-center gap-3 cursor-pointer group">
<div class="relative flex items-center justify-center">
<input class="peer sr-only" type="checkbox">
<div class="w-5 h-5 rounded border border-outline-variant bg-surface-container peer-checked:bg-primary peer-checked:border-primary transition-colors"></div>
<span class="material-symbols-outlined absolute text-on-primary-container text-[16px] opacity-0 peer-checked:opacity-100 pointer-events-none transition-opacity" data-icon="check" data-weight="fill" style="font-variation-settings: 'FILL' 1;">check</span>
</div>
<span class="font-body-sm text-body-sm text-on-surface-variant group-hover:text-on-surface transition-colors">Remember Me</span>
</label>
<a class="font-label-sm text-label-sm text-primary hover:text-primary-fixed transition-colors" href="#">Forgot Password?</a>
</div>
<!-- Primary Action -->
<button class="mt-4 w-full h-[56px] bg-primary text-on-primary-container font-label-md text-label-md rounded-DEFAULT hover:bg-primary-fixed hover:shadow-[0_0_20px_rgba(195,245,255,0.2)] transition-all flex items-center justify-center gap-2" type="submit">
                    Sign In
                    <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Modal Footer -->
<div class="px-gutter pb-gutter pt-4 text-center border-t border-outline-variant/30">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                    New to KTech Solutions? 
                    <a class="font-label-md text-label-md text-primary hover:text-primary-fixed ml-1 transition-colors" href="#">Create Account</a>
</p>
</div>
</div>
